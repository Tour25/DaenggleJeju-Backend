upstream django_backend {
    server backend:8000;
    keepalive 16;
}

# 80 → 443 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name daengglejeju.site www.daengglejeju.site;

    return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daengglejeju.site www.daengglejeju.site;

    ssl_certificate     /etc/letsencrypt/live/daengglejeju.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daengglejeju.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;
    keepalive_timeout 65;

    # Django 앱
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        proxy_redirect off;
        proxy_pass http://django_backend;
    }
    location /static/ {

        alias /var/www/Daengglejeju-Backend/staticfiles/

    }

}
